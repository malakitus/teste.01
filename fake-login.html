<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: #f0f2f5;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }
    .box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #1877f2;
      color: white;
      border: none;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Entrar</h2>
    <form action="https" method="POST">
      <input name="user" placeholder="Email"><br>
      <input name="password" placeholder="Senha" type="password"><br>
      <button>Entrar</button>
    </form>
  </div>
</body>
</html>
